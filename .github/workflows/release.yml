name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Python 3.13
        run: brew install python@3.13

      - name: Build Orbit.app
        run: bash scripts/build-app-bundle.sh --output Orbit.app

      - name: Create release zip
        run: ditto -c -k --sequesterResource --keepParent Orbit.app Orbit-darwin.zip

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: Orbit-darwin.zip

      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: Orbit-darwin
          path: Orbit-darwin.zip
