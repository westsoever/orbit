name: OrbitAccessApp
options:
  bundleIdPrefix: com.orbit
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  xcodeVersion: "15.0"
packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: 6.0.0
targets:
  OrbitAccessApp:
    type: application
    platform: macOS
    sources:
      - path: App
      - path: IPC
      - path: Models
      - path: Stores
      - path: AIFunctions
      - path: Extensions
      - path: Views
      - path: Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orbit.access
        PRODUCT_NAME: OrbitAccessApp
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        CODE_SIGN_ENTITLEMENTS: OrbitAccessApp.entitlements
        INFOPLIST_FILE: Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_APP_SANDBOX: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_ALLOWED: NO
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: GRDB
        product: GRDB
